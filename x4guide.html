<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⚡ X4 Foundations — Guide Ultime</title>
<style>
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
  --accent:#f0a500; --accent2:#e8751a;
  --text:#e6edf3; --muted:#8b949e; --border:#30363d;
  --sw:280px; --hh:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
#hd{height:var(--hh);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10}
#hd-tog{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.15rem;padding:4px 6px;border-radius:4px}
#hd-tog:hover{color:var(--text);background:var(--bg3)}
#hd-title{font-weight:700;font-size:.95rem;color:var(--accent);white-space:nowrap}
#hd-title span{color:var(--muted);font-weight:400;font-size:.78rem;margin-left:8px}
#hd-ri{font-size:.72rem;color:var(--muted);margin-left:auto;white-space:nowrap}
#g-search{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-size:.82rem;width:200px;outline:none;margin-left:8px}
#g-search:focus{border-color:var(--accent)}
#g-search::placeholder{color:var(--muted)}
.nb{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;border-radius:4px;padding:2px 7px;font-size:.78rem}
.nb:hover{color:var(--text);border-color:var(--accent)}
#g-sc{font-size:.72rem;color:var(--muted);min-width:40px;text-align:center}

/* LAYOUT */
#lay{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sb{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s;overflow:hidden}
#sb.closed{width:0}
#sb-hd{padding:10px 14px 6px;font-size:.65rem;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border);flex-shrink:0}
#g-toc{flex:1;overflow-y:auto;padding:6px 0 20px}
#g-toc a{display:block;padding:4px 14px;font-size:.78rem;color:var(--muted);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid transparent;line-height:1.4}
#g-toc a:hover{color:var(--text);background:var(--bg3)}
#g-toc a.act{color:var(--accent);border-left-color:var(--accent);background:rgba(240,165,0,.07)}
#g-toc a.ti{font-weight:700;color:var(--text);font-size:.8rem;margin-top:8px}
#g-toc a.ti.act{color:var(--accent)}
#g-toc a.h3{padding-left:24px;font-size:.74rem}
#g-toc a.h4{padding-left:34px;font-size:.71rem}

/* MAIN */
#ms{flex:1;overflow-y:auto;position:relative}
#g-ld{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:.88rem}
#g-ct{display:none;width:100%;padding:28px 40px 80px}

/* CONTENU GUIDE */
#g-ct h1{color:var(--accent);font-size:1.55rem;font-weight:800;margin:2rem 0 .7rem;padding-bottom:.4rem;border-bottom:2px solid var(--accent);text-transform:uppercase;letter-spacing:.02em}
#g-ct h1:first-child{margin-top:0}
#g-ct h2{color:var(--text);font-size:1.1rem;font-weight:700;margin:1.6rem 0 .5rem;padding-left:10px;border-left:3px solid var(--accent2)}
#g-ct h3{color:var(--accent2);font-size:.95rem;font-weight:600;margin:1.2rem 0 .4rem}
#g-ct h4{color:var(--text);font-size:.88rem;font-weight:600;margin:1rem 0 .3rem}
#g-ct p{line-height:1.75;margin-bottom:.7rem;color:#c9d1d9;font-size:.9rem}
#g-ct ul,#g-ct ol{margin:.4rem 0 .7rem 1.3rem;color:#c9d1d9;font-size:.9rem}
#g-ct li{margin-bottom:.25rem;line-height:1.6}
#g-ct strong,#g-ct b{color:var(--text)}
#g-ct a{color:var(--accent);text-decoration:none}
#g-ct a:hover{text-decoration:underline}
#g-ct hr{border:none;border-top:1px solid var(--border);margin:1.7rem 0}
#g-ct table{width:100%;border-collapse:collapse;margin:.8rem 0 1.3rem;font-size:.82rem}
#g-ct th{background:var(--bg3);color:var(--accent);padding:7px 10px;text-align:left;font-weight:700;border:1px solid var(--border)}
#g-ct td{padding:6px 10px;border:1px solid var(--border);color:#c9d1d9;vertical-align:top}
/* PAS de nth-child ni hover - pour ne pas ecraser les couleurs inline Google Docs */

mark{background:rgba(240,165,0,.28);color:var(--text);border-radius:2px;padding:0 1px}
mark.cur{background:var(--accent);color:#000}

/* BACK TO TOP */
#g-bt{position:fixed;bottom:22px;right:22px;background:var(--accent);color:#000;border:none;border-radius:50%;width:36px;height:36px;font-size:1rem;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.4)}
#g-bt:hover{background:var(--accent2)}

@media(max-width:700px){
  #sb{position:absolute;z-index:20;height:calc(100vh - var(--hh));top:var(--hh)}
  #sb.closed{width:0}
  #g-ct{padding:18px 14px 50px}
  #g-search{width:120px}
  #hd-ri{display:none}
}
</style>
</head>
<body>

<header id="hd">
  <button id="hd-tog">☰</button>
  <div id="hd-title">⚡ X4 Foundations — Guide Ultime <span>v8.0 Diplomacy · Yoh</span></div>
  <div id="hd-ri">Chargement…</div>
  <input type="text" id="g-search" placeholder="Rechercher…"/>
  <button class="nb" id="g-bp">↑</button>
  <button class="nb" id="g-bn">↓</button>
  <span id="g-sc"></span>
</header>

<div id="lay">
  <nav id="sb">
    <div id="sb-hd">Sommaire</div>
    <div id="g-toc"></div>
  </nav>
  <main id="ms">
    <div id="g-ld">Chargement depuis Google Docs…</div>
    <div id="g-ct"></div>
  </main>
</div>

<button id="g-bt">↑</button>

<script>
(function() {
  /* ── GARDE : ne pas s'executer si hors contexte guide (ex: Odoo parent) ── */
  if (!document.getElementById('g-ct')) {
    /* Hors contexte guide : ne rien faire */
    return;
  }

  var DOC = 'https://docs.google.com/document/d/e/2PACX-1vS0RCKFftmhFPhR4fDQg_mADCKelLpdVMIVJ7qVrgX9XtV55fYE3kKsLmE0vIvhOZ7qs5TMxntG42dv/pub';
  var PROXIES = [
    { url: 'https://corsproxy.io/?url=', type: 'text' },
    { url: 'https://api.allorigins.win/get?url=', type: 'json' },
    { url: 'https://api.codetabs.com/v1/proxy?quest=', type: 'text' }
  ];
  var sbOpen = true, ml = [], mi = 0, orig = '', spyTid = null;

  /* ── PROXY CASCADE ── */
  function tryProxy(i) {
    if (i >= PROXIES.length) return Promise.reject(new Error('Tous les proxies ont échoué'));
    var p = PROXIES[i];
    return fetch(p.url + encodeURIComponent(DOC))
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return p.type==='json'?r.json():r.text(); })
      .then(function(d){ return p.type==='json'?d.contents:d; })
      .catch(function(){ return tryProxy(i+1); });
  }

  /* ── NETTOYAGE HTML GOOGLE DOCS ── */
  function cleanGdoc(html) {
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    var body = doc.body;
    if (!body) throw new Error('Corps vide');

    /* 1. Supprimer <style> et <script> Google Docs */
    body.querySelectorAll('style,script').forEach(function(el){ el.remove(); });

    /* 2. Extraire background-color des td/th AVANT tout nettoyage */
    body.querySelectorAll('td,th').forEach(function(el) {
      var s = el.getAttribute('style') || '';
      var m = s.match(/background-color\s*:\s*([^;]+)/i);
      if (m) el.setAttribute('data-bg', m[1].trim());
    });

    /* 3. Supprimer TOUS les styles inline et classes (clean slate) */
    body.querySelectorAll('[style]').forEach(function(el){ el.removeAttribute('style'); });
    body.querySelectorAll('[class]').forEach(function(el){ el.removeAttribute('class'); });

    /* 4. Remettre background-color sur td/th depuis data-bg */
    body.querySelectorAll('[data-bg]').forEach(function(el) {
      el.style.backgroundColor = el.getAttribute('data-bg');
      el.removeAttribute('data-bg');
    });

    /* 5. Supprimer attributs HTML obsoletes */
    ['color','bgcolor','align','width','height','border','cellpadding','cellspacing','valign'].forEach(function(attr){
      body.querySelectorAll('['+attr+']').forEach(function(el){ el.removeAttribute(attr); });
    });

    /* 6. Aplatir les spans sans enfants (Google Docs en génère des centaines) */
    body.querySelectorAll('span').forEach(function(el) {
      if (el.children.length === 0 && !el.querySelector('a')) {
        el.parentNode.replaceChild(doc.createTextNode(el.textContent), el);
      }
    });

    /* 7. Supprimer les images (icones Google Docs) */
    body.querySelectorAll('img').forEach(function(el){ el.remove(); });

    /* 8. Supprimer tout ce qui précède le premier H1 du contenu
          (header Google Docs : icone, "Publié à l'aide de...", etc.) */
    var firstH1 = body.querySelector('h1');
    if (firstH1) {
      /* Remonter jusqu'au parent direct du body */
      var topEl = firstH1;
      while (topEl.parentElement && topEl.parentElement !== body) topEl = topEl.parentElement;
      /* Supprimer tous les noeuds AVANT ce conteneur */
      var node = topEl.previousSibling;
      while (node) { var prev = node.previousSibling; body.removeChild(node); node = prev; }
    }

    /* 9. Supprimer les p/div avec textes parasites Google Docs */
    var NOISE = [
      'published using google docs', 'report abuse', 'learn more',
      'signaler un abus', 'en savoir plus',
      'publi\u00e9 \u00e0 l\u2019aide de google docs',
      'publi\u00e9 \u00e0 l\'aide de google docs'
    ];
    body.querySelectorAll('p,div,a,span').forEach(function(el) {
      var t = el.textContent.trim().toLowerCase();
      if (NOISE.some(function(n){ return t.indexOf(n) !== -1; }) ||
          /^onglet\s*\d*$/i.test(t) ||
          /^tab\s*\d*$/i.test(t) ||
          /updated automatically/i.test(t) ||
          /mise \u00e0 jour automatique/i.test(t)) {
        el.remove();
      }
    });

    /* 10. Supprimer éléments vides restants */
    body.querySelectorAll('p,h1,h2,h3,h4,div').forEach(function(el){
      if (!el.querySelector('table,ul,ol,img') && el.textContent.trim()==='') el.remove();
    });

    return body.innerHTML;
  }

  /* ── CHARGEMENT ── */
  var x4load = function() {
    var ct = document.getElementById('g-ct');
    var ld = document.getElementById('g-ld');
    if (!ct || !ld) return;
    ld.textContent = 'Chargement depuis Google Docs…';
    ld.style.display = 'flex';
    ct.style.display = 'none';
    tryProxy(0)
      .then(function(html) {
        var ct = document.getElementById('g-ct');
        var ld = document.getElementById('g-ld');
        if (!ct) return;
        ct.innerHTML = cleanGdoc(html);
        x4proc(ct);
        x4toc(ct);
        ld.style.display = 'none';
        ct.style.display = 'block';
        orig = ct.innerHTML;
        var n = new Date();
        var ri = document.getElementById('hd-ri');
        if (ri) ri.textContent = 'Sync ' + n.getHours() + ':' + ('0'+n.getMinutes()).slice(-2);
        x4spy();
      })
      .catch(function(e) {
        var ld = document.getElementById('g-ld');
        if (!ld) return;
        ld.innerHTML = '<div style="text-align:center;padding:30px;max-width:440px">'+
          '<p style="color:#f85149;margin-bottom:8px">Chargement impossible</p>'+
          '<p style="font-size:.82rem;color:#8b949e;margin-bottom:12px">'+e.message+'</p>'+
          '<a href="'+DOC+'" target="_blank" style="color:#f0a500;font-size:.82rem">Ouvrir dans Google Docs</a><br><br>'+
          '<button onclick="x4load()" style="background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:6px 14px;border-radius:5px;cursor:pointer">Réessayer</button>'+
          '</div>';
      });
  };

  /* ── TRAITEMENT POST-INSERTION ── */
  function x4proc(ct) {
    var slugs = {};
    ct.querySelectorAll('h1,h2,h3,h4').forEach(function(el) {
      var base = el.textContent.trim().toLowerCase().replace(/[^a-z0-9\u00e0-\u00ff]+/g,'-').replace(/^-|-$/g,'');
      slugs[base] = (slugs[base]||0) + 1;
      el.id = slugs[base] > 1 ? base+'-'+slugs[base] : base;
    });
  }

  /* ── TABLE DES MATIÈRES ── */
  function x4toc(ct) {
    var toc = document.getElementById('g-toc');
    if (!toc) return;
    toc.innerHTML = '';
    ct.querySelectorAll('h1,h2,h3,h4').forEach(function(el) {
      var a = document.createElement('a');
      a.href = '#' + el.id;
      a.textContent = el.textContent.trim();
      var cls = el.tagName==='H1'?'ti':el.tagName==='H3'?'h3':el.tagName==='H4'?'h4':'';
      if (cls) a.className = cls;
      a.onclick = function(e) {
        e.preventDefault();
        var ms = document.getElementById('ms');
        var target = document.getElementById(el.id);
        if (ms && target) ms.scrollTo({ top: target.offsetTop - 10, behavior: 'smooth' });
        if (window.innerWidth <= 700) { var sb = document.getElementById('sb'); if(sb){sb.classList.add('closed');sbOpen=false;} }
      };
      toc.appendChild(a);
    });
  }

  /* ── SCROLL SPY ── */
  function x4spy() {
    var ms = document.getElementById('ms');
    if (!ms) return;
    ms.onscroll = function() {
      /* Back to top */
      var bt = document.getElementById('g-bt');
      if (bt) bt.style.display = ms.scrollTop > 300 ? 'flex' : 'none';
      /* Active TOC item */
      if (spyTid) clearTimeout(spyTid);
      spyTid = setTimeout(function() {
        var ct = document.getElementById('g-ct');
        var toc = document.getElementById('g-toc');
        if (!ct || !toc) return;
        var heads = ct.querySelectorAll('h1,h2,h3');
        var active = null;
        heads.forEach(function(h) { if (h.offsetTop - 20 <= ms.scrollTop) active = h; });
        toc.querySelectorAll('a').forEach(function(a) { a.classList.remove('act'); });
        if (active) {
          var link = toc.querySelector('a[href="#'+active.id+'"]');
          if (link) { link.classList.add('act'); link.scrollIntoView({block:'nearest'}); }
        }
      }, 80);
    };
  }

  /* ── RECHERCHE ── */
  var x4search = function(q) {
    var ct = document.getElementById('g-ct');
    if (!ct) return;
    ct.innerHTML = orig;
    x4proc(ct);
    ml = []; mi = 0;
    var sc = document.getElementById('g-sc');
    if (!q.trim()) { if(sc) sc.textContent=''; return; }
    var walker = document.createTreeWalker(ct, NodeFilter.SHOW_TEXT);
    var textNodes = [];
    var node;
    while ((node = walker.nextNode())) textNodes.push(node);
    var re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    textNodes.forEach(function(tn) {
      if (!re.test(tn.textContent)) return;
      re.lastIndex = 0;
      var frag = document.createDocumentFragment();
      var last = 0, m;
      while ((m = re.exec(tn.textContent)) !== null) {
        frag.appendChild(document.createTextNode(tn.textContent.slice(last, m.index)));
        var mk = document.createElement('mark');
        mk.textContent = m[0];
        frag.appendChild(mk);
        ml.push(mk);
        last = m.index + m[0].length;
      }
      frag.appendChild(document.createTextNode(tn.textContent.slice(last)));
      tn.parentNode.replaceChild(frag, tn);
      re.lastIndex = 0;
    });
    if (ml.length) { ml[0].className = 'cur'; x4scrollTo(ml[0]); }
    if (sc) sc.textContent = ml.length ? '1/'+ml.length : '0';
  };

  var x4nav = function(dir) {
    if (!ml.length) return;
    ml[mi].className = '';
    mi = (mi + dir + ml.length) % ml.length;
    ml[mi].className = 'cur';
    x4scrollTo(ml[mi]);
    var sc = document.getElementById('g-sc');
    if (sc) sc.textContent = (mi+1)+'/'+ml.length;
  };

  var x4snav = function(e) {
    if (e.key === 'Enter') { x4nav(e.shiftKey ? -1 : 1); }
    if (e.key === 'Escape') {
      var gs = document.getElementById('g-search');
      if (gs) gs.value = '';
      x4search('');
    }
  };

  function x4scrollTo(el) {
    var ms = document.getElementById('ms');
    if (ms && el) ms.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
  }

  var x4top = function() {
    var ms = document.getElementById('ms');
    if (ms) ms.scrollTo({ top: 0, behavior: 'smooth' });
  };

  var x4sb = function() {
    var sb = document.getElementById('sb');
    if (!sb) return;
    sbOpen = !sbOpen;
    sb.classList.toggle('closed', !sbOpen);
  };

  /* ── AUTO-REFRESH ── */
  setInterval(function() {
    var gs = document.getElementById('g-search');
    if (gs && !gs.value.trim()) x4load();
  }, 300000);

  /* ── ATTACHER LES ÉVÉNEMENTS (pas de handlers inline → pas d'erreurs Odoo) ── */
  document.getElementById('g-search').addEventListener('input', function(){ x4search(this.value); });
  document.getElementById('g-search').addEventListener('keydown', x4snav);
  document.getElementById('g-bp').addEventListener('click', function(){ x4nav(-1); });
  document.getElementById('g-bn').addEventListener('click', function(){ x4nav(1); });
  document.getElementById('g-bt').addEventListener('click', x4top);
  document.getElementById('hd-tog').addEventListener('click', x4sb);
  /* x4load exposé globalement uniquement pour le bouton "Réessayer" dans le message d'erreur */
  window.x4load = x4load;

  /* ── LANCEMENT ── */
  x4load();
})();
</script>
</body>
</html>
